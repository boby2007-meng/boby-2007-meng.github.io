<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>虚墨</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;}
body{background:#000;display:flex;align-items:center;justify-content:center;}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block;touch-action:none;}
/* ===== 虚拟手柄 ===== */
#vpad{position:fixed;inset:0;pointer-events:none;z-index:10;}
.vb{position:absolute;pointer-events:all;border-radius:50%;border:1.5px solid rgba(255,255,255,0.2);background:rgba(18,14,26,0.62);color:rgba(255,255,255,0.72);font-family:serif;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;cursor:pointer;transition:background .07s;}
.vb span{font-size:9px;opacity:0.48;font-family:monospace;margin-top:1px;}
.vb.on{background:rgba(255,255,255,0.3)!important;border-color:rgba(255,255,255,0.55)!important;}
/* 左侧：移动 + 辅助跳（三角布局） */
#vL {width:66px;height:66px;font-size:24px;bottom:20px;left:14px;}
#vR {width:66px;height:66px;font-size:24px;bottom:20px;left:88px;}
#vJL{width:58px;height:58px;font-size:13px;bottom:96px;left:50px;border-color:rgba(200,180,60,0.4);background:rgba(75,65,0,0.3);}
/* 右侧：技能 + 主跳 */
#vZ{width:80px;height:80px;font-size:16px;bottom:8px;right:8px;border-color:rgba(200,180,60,0.58);background:rgba(110,95,0,0.32);}
#vX{width:55px;height:55px;font-size:14px;bottom:84px;right:100px;border-color:rgba(200,80,40,0.52);background:rgba(110,16,0,0.26);}
#vC{width:55px;height:55px;font-size:14px;bottom:84px;right:38px;border-color:rgba(60,120,220,0.52);background:rgba(14,44,120,0.26);}
/* 顶栏辅助键 */
#vPause{width:36px;height:36px;border-radius:8px;font-size:15px;top:8px;right:8px;background:rgba(18,14,26,0.5);border:1px solid rgba(255,255,255,0.15);}
/* ===== 按键大小三档（切换 body class） ===== */
/* 小 (bsm) */
body.bsm #vL {width:52px;height:52px;font-size:19px;bottom:24px;left:14px;}
body.bsm #vR {width:52px;height:52px;font-size:19px;bottom:24px;left:72px;}
body.bsm #vJL{width:46px;height:46px;font-size:11px;bottom:84px;left:41px;}
body.bsm #vZ {width:62px;height:62px;font-size:14px;bottom:10px;right:10px;}
body.bsm #vX {width:44px;height:44px;font-size:12px;bottom:68px;right:62px;}
body.bsm #vC {width:44px;height:44px;font-size:12px;bottom:68px;right:14px;}
/* 大 (blg) */
body.blg #vL {width:82px;height:82px;font-size:28px;bottom:16px;left:12px;}
body.blg #vR {width:82px;height:82px;font-size:28px;bottom:16px;left:106px;}
body.blg #vJL{width:72px;height:72px;font-size:15px;bottom:108px;left:60px;}
body.blg #vZ {width:98px;height:98px;font-size:18px;bottom:6px;right:6px;}
body.blg #vX {width:68px;height:68px;font-size:15px;bottom:100px;right:116px;}
body.blg #vC {width:68px;height:68px;font-size:15px;bottom:100px;right:42px;}
/* ===== 竖屏强制横屏提示 ===== */
#vRotate{display:none;position:fixed;inset:0;background:#000;z-index:200;align-items:center;justify-content:center;color:#c8a060;font:20px serif;text-align:center;flex-direction:column;gap:18px;}
#vRotate .arr{font-size:58px;animation:spin 2.4s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
@media(pointer:fine){#vpad{display:none;}}
@media(pointer:coarse)and(orientation:portrait){#vRotate{display:flex;}canvas{visibility:hidden;}#vpad{display:none!important;}}
/* 布局编辑模式：vpad 始终可见，按钮高亮 */
body.layout-edit #vpad{display:block!important;}
#vpad.editmode .vb{border-width:2px;border-color:rgba(180,150,255,0.55)!important;cursor:grab;}
#vpad.editmode .vb.on{background:rgba(160,120,240,0.28)!important;border-color:#c8a0ff!important;}
/* 编辑工具栏 */
#editBar{display:none;position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(10,7,18,0.94);border-bottom:1px solid rgba(180,140,40,0.3);padding:6px 10px;align-items:center;gap:7px;}
#editSelLbl{color:#c8a060;font:12px serif;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.ebb{background:rgba(28,20,42,0.85);border:1px solid rgba(120,90,160,0.45);color:rgba(200,178,224,0.85);font:14px serif;padding:4px 11px;border-radius:6px;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.ebb:active{background:rgba(80,60,110,0.6);}
#editSzLbl{color:#6a5a7a;font:11px monospace;min-width:30px;text-align:center;}
#editOk{border-color:rgba(180,140,40,0.55);color:#c8a060;}
#editRst{border-color:rgba(160,50,50,0.45);color:rgba(210,110,90,0.85);}
</style>
</head>
<body>
<canvas id="c" width="800" height="600"></canvas>
<div id="vpad">
  <button class="vb" id="vL">◀</button>
  <button class="vb" id="vR">▶</button>
  <button class="vb" id="vJL">跳<span>Z</span></button>
  <button class="vb" id="vZ">跳跃<span>Z</span></button>
  <button class="vb" id="vX">X<span>技能1</span></button>
  <button class="vb" id="vC">C<span>技能2</span></button>
  <button class="vb" id="vPause">⏸</button>
</div>
<div id="editBar">
  <span id="editSelLbl">点击按钮选中</span>
  <button class="ebb" id="eSzM">−</button>
  <span id="editSzLbl"></span>
  <button class="ebb" id="eSzP">+</button>
  <button class="ebb" id="editRst">重置</button>
  <button class="ebb" id="editOk">完成</button>
</div>
<div id="vRotate">
  <div class="arr">⟳</div>
  <div>请横屏游玩</div>
  <div style="font-size:13px;opacity:0.55;margin-top:4px">Rotate device to landscape</div>
</div>
<script>
'use strict';
const C=document.getElementById('c'), ctx=C.getContext('2d');
const W=800,H=600;
ctx.imageSmoothingEnabled=false;

// INPUT
const keys={},justDown={};
document.addEventListener('keydown',e=>{if(!keys[e.code]){justDown[e.code]=true;onKeyPress(e.code);}keys[e.code]=true;e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
function clearJD(){for(const k in justDown)delete justDown[k];}

// CONSTANTS
const GRAVITY=0.4,WALK_SPD=3.5,JUMP1=-8.5,JUMP2=-7.5,MAX_FALL=9;
const SWORD_CD=72,STAR_CD=42,SMOKE_CD=360,DASH_CD=120;

// STATE
let state='title',selChar=0,chosenChar='xuyuan';
let deaths=0,chapterIdx=0,roomIdx=0,nextChapterIdx=0,titleSel=0;
let cam={x:0,y:0};
let movingSpikes=[],movingPlatforms=[],particles=[],screenShake=0;
let saveFlash=0,deathFlash=0,deathTimer=0,frame=0,room=null;

// PLAYER
let respawnX=0,respawnY=0;  // 当前复活点（独立全局，不挂在 P 上）
const P={x:0,y:0,vx:0,vy:0,w:16,h:26,onGround:false,jumpsLeft:2,dead:false,
         swordCd:0,starCd:0,dashCd:0,smokeCd:0,
         dashActive:0,dashVx:0,iframes:0,burstQueue:[],smokeTimer:0,
         facing:1,wasOnGround:false};
function resetP(x,y){
  P.x=(x!==undefined)?x:respawnX;
  P.y=(y!==undefined)?y:respawnY;
  P.vx=0;P.vy=0;P.onGround=false;P.jumpsLeft=2;P.dead=false;deathFlash=0;
  P.wasOnGround=false;P.dashActive=0;P.iframes=90;P.burstQueue=[];P.smokeTimer=0;
  for(const e of enemies)e.cd=Math.max(e.cd,Math.floor((e.maxCd||180)*0.55));
  const rH=room?(room.height||H):H;
  cam.y=Math.max(0,Math.min(P.y-H*0.4,rH-H));
}

// PROJECTILES & ENEMIES
let bullets=[],thrownStars=[],swordWaves=[],enemies=[];
let boss=null,bossWarnings=[];
const BOSS_P2_HP=10;
const BOSS_P1_SEQ=['dash','shoot3','wallJump','shoot3','dash','wallJump'];
const BOSS_P2_SEQ=['dash','shoot5','bladeRain','dash','shoot5','wallJump'];
const CHIMEI_P1_SEQ=['dash','hWave','wallJump','hWave','dash','bladeRain','hWave','dash'];
const CHIMEI_P2_SEQ=['dash','hWave','bladeRain','dash','hWave','dash','bladeRain','hWave'];
const WANGLIANG_P1_SEQ=['shoot3','scatter','shoot5','scatter','shoot3','wallJump','shoot5','scatter'];
const WANGLIANG_P2_SEQ=['scatter','shoot5','bladeRain','scatter','shoot5','scatter','bladeRain','shoot5'];
const XUYUAN_MIRROR_P1_SEQ=['hWave','dash','hWave','wallJump','hWave','dash'];
const XUYUAN_MIRROR_P2_SEQ=['dash','hWave','bladeRain','dash','hWave','dash'];
const MOXUE_MIRROR_P1_SEQ=['shoot3','scatter','shoot3','shoot5','scatter','shoot3'];
const MOXUE_MIRROR_P2_SEQ=['scatter','shoot5','bladeRain','scatter','shoot5','scatter'];

// AABB
function ov(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}
// 圆形碰撞（用于旋转锯刃）
function circHit(cx,cy,cr){
  const nx=Math.max(P.x+2,Math.min(P.x+P.w-2,cx));
  const ny=Math.max(P.y+2,Math.min(P.y+P.h-2,cy));
  return Math.hypot(nx-cx,ny-cy)<cr-2;
}

// CG SYSTEM
let cgQ=[],cgI=0,cgCb=null;
function showCG(sc,cb){cgQ=sc;cgI=0;cgCb=cb;state='cg';}
function advCG(){cgI++;if(cgI>=cgQ.length){state='playing';if(cgCb){cgCb();cgCb=null;}}}

// ===== SPRITE PALETTE =====
const PAL={
  ' ':null,'K':'#080810','N':'#16162a','B':'#142040','S':'#c89060','D':'#b07848',
  'e':'#1a1a2e','E':'#1a3060','G':'#6a7080','g':'#3a2808','I':'#cca020',
  'H':'#0a0a18','h':'#101840','k':'#303040','r':'#7a0000','a':'#3a6080',
  'w':'#8a8aaa','R':'#5a0000','A':'#2a5080',
  'F':'#f0f0f8','L':'#e0c4a0','O':'#050508','V':'#4a7898','J':'#c8b870',
};

// 13行×12字符，scale2渲染为24×26px，角色实体占位8列=16px匹配碰撞箱
const XY_SPR=[
  ' KKkKKKkKK  ',  // 0 hair — swept back
  '  KLSSSSSK  ',  // 1 face — L=forehead highlight
  '  KSFeSFeK  ',  // 2 eyes — F=white sclera
  '  KSSSSSgK  ',  // 3 face lower
  '   JgSSgJ   ',  // 4 jaw — J=gold collar hint
  '  OkJHHJkO  ',  // 5 collar — J=gold trim edges
  ' OkHHwHHkO  ',  // 6 robe — w=center seam
  ' OkHHwHHkO  ',  // 7 robe
  ' OkHHIHHkO  ',  // 8 robe — I=gold belt
  '   HH  HH   ',  // 9 legs
  '   HH  HH   ',  // 10 legs
  '  KKK  KKK  ',  // 11 boots — wider base
  '  KKK  KKK  ',  // 12 boot sole
];
const MX_SPR=[
  ' IhhhhhhhIh ',  // 0 hair — I=gold hairpin at temples
  '  hSLSSSh   ',  // 1 face — L=forehead highlight
  '  hSFeSFh   ',  // 2 eyes — F=white sclera
  '  hSSSSShh  ',  // 3 face lower
  '   hSSShh   ',  // 4 chin
  '   VBBBV    ',  // 5 collar — V=lighter blue accent
  '  aBBVBBa   ',  // 6 robe — V=center highlight
  '  aBBVBBa   ',  // 7 robe
  '  aBBIBBa   ',  // 8 robe — I=gold belt
  '   BB  BB   ',  // 9 legs
  '   BB  BB   ',  // 10 legs
  '  hhh  hhh  ',  // 11 boots — wider base
  '  hhh  hhh  ',  // 12 boot sole
];

function drawSprite(spr,x,y,sc){
  const s=sc||2;
  spr.forEach((row,ry)=>{
    for(let rx=0;rx<row.length;rx++){
      const c=row[rx];
      if(c!==' '&&PAL[c]){ctx.fillStyle=PAL[c];ctx.fillRect(Math.floor(x)+rx*s,Math.floor(y)+ry*s,s,s);}
    }
  });
}

function drawXuyuan(x,y,sc){
  const s=sc||2;
  const sx=Math.floor(x),sy=Math.floor(y);
  // 长剑背于身后（左肩至腰）
  ctx.fillStyle='#181828';ctx.fillRect(sx+9*s,sy,s,11*s);           // scabbard shadow
  ctx.fillStyle='#c8cce0';ctx.fillRect(sx+9*s,sy+s,s,10*s);         // blade
  ctx.fillStyle='rgba(255,255,255,0.55)';ctx.fillRect(sx+9*s,sy+s,1,8*s); // edge gleam
  ctx.fillStyle='#b09840';ctx.fillRect(sx+8*s,sy+3*s,3*s,s);        // guard
  ctx.fillStyle='#d4c050';ctx.fillRect(sx+8*s,sy+3*s,3*s,1);        // guard highlight
  ctx.fillStyle='#1a0c0c';ctx.fillRect(sx+9*s,sy+4*s,s,3*s);        // hilt
  ctx.fillStyle='#4a2010';
  for(let i=0;i<3;i++)ctx.fillRect(sx+9*s,sy+(4+i)*s,s,1);         // hilt wrap
  drawSprite(XY_SPR,x,y,s);
}
function drawMoxue(x,y,sc){
  const s=sc||2;
  const sx=Math.floor(x),sy=Math.floor(y);
  // 发簪（横穿发髻，左侧带蓝宝石坠）
  ctx.fillStyle='#c89820';ctx.fillRect(sx+2*s,sy,8*s,s);            // pin shaft
  ctx.fillStyle='#e8d040';ctx.fillRect(sx+2*s,sy,8*s,1);            // highlight
  ctx.fillStyle='#1848a0';ctx.fillRect(sx+s,sy,s,s);                // gem
  ctx.fillStyle='#5090d8';ctx.fillRect(sx+s,sy,1,1);                // gem gleam
  drawSprite(MX_SPR,x,y,s);
}
// 落地尘土 / 清弹命中 粒子
function spawnDust(x,y){
  for(let i=0;i<5;i++){
    const a=Math.PI*(0.75+Math.random()*0.5);
    const spd=0.7+Math.random()*1.1;
    particles.push({x:x+(Math.random()-0.5)*14,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-0.4,life:14,max:14,gold:false});
  }
}
function spawnHit(x,y){
  for(let i=0;i<5;i++){
    const a=Math.random()*Math.PI*2,spd=1.2+Math.random()*2.2;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:9,max:9,gold:true});
  }
}

function drawChar(x,y,char,dead,sc){
  if(dead){ctx.fillStyle='rgba(200,20,20,0.8)';ctx.fillRect(Math.floor(x),Math.floor(y),P.w,P.h);return;}
  const s=sc||2;
  const sprW=12*s;
  // 面朝左时以精灵中心为轴水平翻转
  if(P.facing<0&&!sc){
    ctx.save();
    ctx.translate(2*(Math.floor(x)+sprW/2),0);
    ctx.scale(-1,1);
    if(char==='xuyuan')drawXuyuan(x,y,s);
    else drawMoxue(x,y,s);
    ctx.restore();
  } else {
    if(char==='xuyuan')drawXuyuan(x,y,s);
    else drawMoxue(x,y,s);
  }
}

// ===== WUXIA HAZARD DRAWING =====
// Bamboo stakes — natural, for outdoor rooms
function drawBamboo(s){
  const UNIT=9;
  const n=Math.floor(s.w/UNIT)+1;
  const VH=36;
  const vars=[0,-6,4,-9,2,-4,7,-5,1,-7];
  for(let i=0;i<n;i++){
    const bx=s.x+i*UNIT;
    if(bx>=s.x+s.w)break;
    const vh=VH+vars[i%10];
    const baseY=(s.dir==='up')?s.y+s.h:s.y;
    const sign=(s.dir==='up')?-1:1;
    const shaftH=vh-8;
    ctx.fillStyle=i%3===0?'#2a5818':'#3a6a22';
    ctx.fillRect(bx+2,baseY+sign*8+(sign<0?-shaftH:0),5,shaftH);
    ctx.fillStyle='#1a3810';
    for(let j=8;j<shaftH;j+=10){
      const jy=baseY+sign*(j+4);
      ctx.fillRect(bx+1,jy,7,1);
    }
    ctx.fillStyle='#d4b050';
    ctx.beginPath();
    if(s.dir==='up'){ctx.moveTo(bx+4,baseY-vh);ctx.lineTo(bx+1,baseY-vh+8);ctx.lineTo(bx+7,baseY-vh+8);}
    else{ctx.moveTo(bx+4,baseY+vh);ctx.lineTo(bx+1,baseY+vh-8);ctx.lineTo(bx+7,baseY+vh-8);}
    ctx.closePath();ctx.fill();
  }
}

// Sword blade arrays — for ruins/indoor rooms
function drawBlade(s){
  const UNIT=16;
  const n=Math.floor(s.w/UNIT)+1;
  const VH=42;
  for(let i=0;i<n;i++){
    const bx=s.x+i*UNIT;
    if(bx>=s.x+s.w)break;
    if(s.dir==='up'){
      const baseY=s.y+s.h;
      const bladeH=Math.floor(VH*0.62);
      const handleH=Math.floor(VH*0.26);
      // Blade
      ctx.fillStyle='#c0c4d4';
      ctx.beginPath();ctx.moveTo(bx+UNIT/2,baseY-VH);ctx.lineTo(bx+UNIT/2-2,baseY-bladeH);ctx.lineTo(bx+UNIT/2+2,baseY-bladeH);ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(0,0,0,0.18)';ctx.fillRect(bx+UNIT/2,baseY-VH+2,1,bladeH-6);
      ctx.fillStyle='rgba(255,255,255,0.5)';
      ctx.beginPath();ctx.moveTo(bx+UNIT/2-0.5,baseY-VH+3);ctx.lineTo(bx+UNIT/2-1.5,baseY-bladeH-1);ctx.lineTo(bx+UNIT/2,baseY-bladeH-2);ctx.closePath();ctx.fill();
      // Guard
      ctx.fillStyle='#9a7020';ctx.fillRect(bx+1,baseY-bladeH,UNIT-2,4);
      ctx.fillStyle='#c8a030';ctx.fillRect(bx+1,baseY-bladeH,UNIT-2,1);
      // Handle
      ctx.fillStyle='#220808';ctx.fillRect(bx+UNIT/2-2,baseY-bladeH-handleH,4,handleH);
      ctx.fillStyle='#481010';
      for(let w=0;w<handleH;w+=4)ctx.fillRect(bx+UNIT/2-2,baseY-bladeH-handleH+w,4,2);
      // Socket
      ctx.fillStyle='#18182a';ctx.fillRect(bx+2,baseY-4,UNIT-4,4);
    }
    else if(s.dir==='down'){
      const baseY=s.y;
      const bladeH=Math.floor(VH*0.62);
      const handleH=Math.floor(VH*0.26);
      // Chain
      ctx.strokeStyle='#484858';ctx.lineWidth=1;
      for(let ch=0;ch<10;ch+=3)ctx.strokeRect(bx+UNIT/2-1,baseY+ch,2,2);
      // Handle
      ctx.fillStyle='#220808';ctx.fillRect(bx+UNIT/2-2,baseY+10,4,handleH);
      ctx.fillStyle='#481010';
      for(let w=0;w<handleH;w+=4)ctx.fillRect(bx+UNIT/2-2,baseY+10+w,4,2);
      // Guard
      ctx.fillStyle='#9a7020';ctx.fillRect(bx+1,baseY+10+handleH,UNIT-2,4);
      ctx.fillStyle='#c8a030';ctx.fillRect(bx+1,baseY+10+handleH,UNIT-2,1);
      // Blade (pointing down)
      ctx.fillStyle='#c0c4d4';
      ctx.beginPath();ctx.moveTo(bx+UNIT/2,baseY+VH);ctx.lineTo(bx+UNIT/2-2,baseY+10+handleH+3);ctx.lineTo(bx+UNIT/2+2,baseY+10+handleH+3);ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.45)';
      ctx.beginPath();ctx.moveTo(bx+UNIT/2-0.5,baseY+VH-3);ctx.lineTo(bx+UNIT/2-1.5,baseY+10+handleH+6);ctx.lineTo(bx+UNIT/2,baseY+10+handleH+8);ctx.closePath();ctx.fill();
      ctx.fillStyle='#18182a';ctx.fillRect(bx+2,baseY,UNIT-4,4);
    }
  }
}

// Wall arrow banks — embedded arrows pointing inward
function drawWallArrows(s){
  const UNIT=20;
  const fwd=s.dir==='right'?1:-1;
  const n=Math.floor(s.h/UNIT);
  for(let i=0;i<n;i++){
    const ay=s.y+i*UNIT+UNIT/2;
    const axBase=s.dir==='right'?s.x:s.x+s.w;
    const len=s.w-4;
    ctx.strokeStyle='#6a4820';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(axBase,ay);ctx.lineTo(axBase+fwd*(len-8),ay);ctx.stroke();
    ctx.fillStyle='#a8a8bc';
    ctx.beginPath();ctx.moveTo(axBase+fwd*len,ay);ctx.lineTo(axBase+fwd*(len-9),ay-4);ctx.lineTo(axBase+fwd*(len-9),ay+4);ctx.closePath();ctx.fill();
    ctx.strokeStyle='#7a3820';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(axBase+fwd*4,ay);ctx.lineTo(axBase+fwd*12,ay-5);ctx.moveTo(axBase+fwd*4,ay);ctx.lineTo(axBase+fwd*12,ay+5);ctx.stroke();

// Spinning blade — circular saw, x/y=center, r=radius
function drawSpinBlade(s){
  const cx=s.x,cy=s.y,r=s.r,angle=frame*0.07+(s.phase||0);
  ctx.save();ctx.translate(cx,cy);
  // 外光圈
  ctx.strokeStyle='rgba(180,185,220,0.25)';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(0,0,r+3,0,Math.PI*2);ctx.stroke();
  ctx.rotate(angle);
  const teeth=7;
  for(let i=0;i<teeth;i++){
    const a=i/teeth*Math.PI*2;
    const bx=Math.cos(a)*r,by=Math.sin(a)*r;
    const lx=Math.cos(a)*(r-9),ly=Math.sin(a)*(r-9);
    const ox=Math.cos(a+0.38)*(r-4),oy=Math.sin(a+0.38)*(r-4);
    ctx.fillStyle='#c0c4d8';
    ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(lx,ly);ctx.lineTo(ox,oy);ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(220,225,255,0.35)';
    ctx.beginPath();ctx.moveTo(bx*0.88,by*0.88);ctx.lineTo(lx*0.82,ly*0.82);ctx.lineTo(ox*0.82,oy*0.82);ctx.closePath();ctx.fill();
  }
  // 内圆盘
  ctx.fillStyle='#28283a';ctx.beginPath();ctx.arc(0,0,r*0.38,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(160,165,210,0.55)';ctx.beginPath();ctx.arc(0,0,r*0.14,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawHazard(s){
  const t=s.type||'blade';
  if(t==='spinning_blade')drawSpinBlade(s);
  else if(t==='bamboo')drawBamboo(s);
  else if(t==='timed_blade'){
    const cyc=(frame+(s.phase||0))%s.period;
    const on=cyc<s.period*0.55;
    const warn=cyc>=s.period*0.46&&cyc<s.period*0.55;
    if(on)drawBlade(s);
    else{ctx.globalAlpha=warn?(0.3+0.5*Math.abs(Math.sin(frame*0.5))):0.15;drawBlade(s);ctx.globalAlpha=1;}
  }
  else if(t==='hidden_blade'){
    const dx=P.x+P.w/2-(s.x+s.w/2),dy=P.y+P.h/2-(s.y+s.h/2);
    const dist=Math.hypot(dx,dy);
    const a=dist<160?Math.min(1,1-(dist-60)/100):0;
    if(a>0.01){ctx.globalAlpha=Math.max(0.1,a);drawBlade(s);ctx.globalAlpha=1;}
  }
  else if(t==='wall_arrow')drawWallArrows(s);
  else drawBlade(s);
}
function updateMovingSpikes(){
  for(const s of movingSpikes){
    s.x+=(s.vx||0);s.y+=(s.vy||0);
    if(s.vx!==undefined){if(s.x<=s.x0)s.vx=Math.abs(s.vx);else if(s.x+s.w>=s.x1)s.vx=-Math.abs(s.vx);}
    if(s.vy!==undefined){if(s.y<=s.y0)s.vy=Math.abs(s.vy);else if(s.y+s.h>=s.y1)s.vy=-Math.abs(s.vy);}
  }
}

function drawBullet(b){
  if(b.type==='arrow'){
    const d=b.dir||(b.vx>=0?1:-1);
    ctx.save();ctx.translate(b.x+b.w/2,b.y+b.h/2);
    ctx.strokeStyle='#7a5020';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-d*b.w/2,0);ctx.lineTo(d*(b.w/2-8),0);ctx.stroke();
    ctx.fillStyle='#b0b0c4';
    ctx.beginPath();ctx.moveTo(d*b.w/2,0);ctx.lineTo(d*(b.w/2-9),-4);ctx.lineTo(d*(b.w/2-9),4);ctx.closePath();ctx.fill();
    ctx.strokeStyle='#8a3820';ctx.lineWidth=1;
    const fx=-d*(b.w/2-4);
    ctx.beginPath();ctx.moveTo(fx,0);ctx.lineTo(fx+d*7,-5);ctx.moveTo(fx,0);ctx.lineTo(fx+d*7,5);ctx.stroke();
    ctx.restore();
  }
  else if(b.type==='dart'){
    ctx.save();ctx.translate(b.x+b.w/2,b.y+b.h/2);ctx.rotate(frame*0.18);
    ctx.fillStyle='#c4c4d8';
    ctx.beginPath();ctx.moveTo(0,-7);ctx.lineTo(3,0);ctx.lineTo(0,7);ctx.lineTo(-3,0);ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(200,200,255,0.4)';ctx.lineWidth=1;ctx.stroke();
    ctx.restore();
  }
  else if(b.type==='qi'){
    ctx.save();ctx.translate(b.x+b.w/2,b.y+b.h/2);
    const pulse=0.7+0.3*Math.sin(frame*0.25);
    ctx.fillStyle=`rgba(80,160,255,${0.38*pulse})`;ctx.beginPath();ctx.arc(0,0,b.w/2+4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(140,200,255,${0.78*pulse})`;ctx.beginPath();ctx.arc(0,0,b.w/2,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(200,230,255,0.9)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(0,0,b.w/2,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
  else if(b.type==='knife'){
    ctx.save();ctx.translate(b.x+b.w/2,b.y+b.h/2);
    const angle=Math.atan2(b.vy,b.vx)+frame*0.25;ctx.rotate(angle);
    ctx.fillStyle='#c0c0cc';ctx.fillRect(-9,-2,18,4);
    ctx.fillStyle='#8a6020';ctx.fillRect(-9,-2,5,4);
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fillRect(-3,-1,9,1);
    ctx.restore();
  }
  else if(b.type==='boss_qi'){
    ctx.save();ctx.translate(b.x+b.w/2,b.y+b.h/2);
    const pulse=0.7+0.3*Math.sin(frame*0.28+b.y*0.01);
    ctx.fillStyle=`rgba(100,20,160,${0.28*pulse})`;ctx.beginPath();ctx.arc(0,0,b.w/2+5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(200,80,255,${0.88*pulse})`;ctx.beginPath();ctx.arc(0,0,b.w/2,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(230,160,255,0.9)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(0,0,b.w/2,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
  else if(b.type==='boss_blade'){
    ctx.save();ctx.translate(b.x+b.w/2,b.y+b.h/2);
    ctx.fillStyle='rgba(50,8,80,0.96)';ctx.fillRect(-5,-15,10,30);
    ctx.fillStyle='rgba(180,60,220,0.75)';ctx.fillRect(-3,-15,6,2);
    ctx.fillStyle='rgba(210,130,255,0.55)';ctx.fillRect(-2,-13,4,26);
    ctx.strokeStyle='rgba(160,50,200,0.6)';ctx.lineWidth=1;ctx.strokeRect(-5,-15,10,30);
    ctx.restore();
  }
  else{ctx.fillStyle=b.c||'#f80';ctx.fillRect(b.x,b.y,b.w,b.h);}
}

// ===== ENEMIES =====
function updateEnemies(){
  for(const e of enemies){
    e.cd--;
    if(e.cd<=0){
      e.cd=e.maxCd||180;
      if(e.type==='arrow_wall'){
        const d=e.faceDir||(P.x>e.x?1:-1);
        // 同时射出两支错开的箭
        bullets.push({x:e.x,y:e.y-6,w:22,h:6,vx:d*11,vy:0,type:'arrow',dir:d});
        bullets.push({x:e.x,y:e.y+4,w:22,h:6,vx:d*11,vy:0,type:'arrow',dir:d});
      }
      else if(e.type==='dart_shower'){
        // 5枚扇形飞镖，速度更快
        for(let i=-2;i<=2;i++)bullets.push({x:e.x+4,y:e.y+4,w:10,h:10,vx:i*2.2,vy:6.5,type:'dart'});
      }
      else if(e.type==='qi_shooter'){
        const dx=P.x+P.w/2-(e.x+8),dy=P.y+P.h/2-(e.y+8);
        const spd=7,len=Math.hypot(dx,dy)||1;
        bullets.push({x:e.x,y:e.y,w:14,h:14,vx:dx/len*spd,vy:dy/len*spd,type:'qi'});
        // 同时射出两枚偏移追踪弹
        const angle=Math.atan2(dy,dx);
        bullets.push({x:e.x,y:e.y,w:12,h:12,vx:Math.cos(angle+0.4)*5.5,vy:Math.sin(angle+0.4)*5.5,type:'qi'});
        bullets.push({x:e.x,y:e.y,w:12,h:12,vx:Math.cos(angle-0.4)*5.5,vy:Math.sin(angle-0.4)*5.5,type:'qi'});
      }
    }
  }
}

function drawEnemies(){
  for(const e of enemies){
    const charge=1-e.cd/(e.maxCd||180);
    if(e.type==='arrow_wall'){
      ctx.fillStyle='#2a2038';ctx.fillRect(e.x-10,e.y-10,20,22);

      ctx.beginPath();ctx.moveTo(e.x-10,e.y);ctx.lineTo(e.x+10,e.y);ctx.stroke();

}

        const py=40+((Math.sin(t*0.55+i*0.9)*0.5+0.5)*520);
        const pulse=0.07+0.07*Math.sin(frame*0.08+i*1.7);
        ctx.globalAlpha=pulse;ctx.fillStyle=i%2===0?'#4060c0':'#8090d8';ctx.fillRect(Math.floor(px),Math.floor(py),1,1);
      }
      ctx.globalAlpha=1;
    } else {
      // 棋局 — 月下高楼，落花
      for(let i=0;i<10;i++){
        const age=(frame*0.6+i*40)%220;
        const px=80+((i*151+i*i*19)%640)+Math.sin(frame*0.025+i)*12;
        const py=age*1.2-40;
        if(py<-10||py>H+10)continue;
        const a=Math.max(0,1-age/220)*0.45;
        ctx.globalAlpha=a;ctx.fillStyle='#9898d0';
        ctx.beginPath();ctx.ellipse(Math.floor(px),Math.floor(py),3,2,frame*0.015+i,0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=1;
    }
  }
}

const CHAPTERS=[PROLOGUE,CHAPTER1,CHAPTER2,CHAPTER3];

// ===== LOAD ROOM =====
function loadRoom(ci,ri){
  chapterIdx=ci;roomIdx=ri;saveProgress();
  bullets=[];thrownStars=[];swordWaves=[];particles=[];screenShake=0;cam.x=0;cam.y=0;boss=null;bossWarnings=[];
  room=JSON.parse(JSON.stringify(CHAPTERS[ci][ri]));
  movingSpikes=(room.movingSpikes||[]).map(s=>Object.assign({},s));
  movingPlatforms=(room.movingPlatforms||[]).map(s=>Object.assign({},s));
  if(room['preCG_'+chosenChar])room.preCG=room['preCG_'+chosenChar];
  if(room['postCG_'+chosenChar])room.postCG=room['postCG_'+chosenChar];
  enemies=room.enemies||[];
  respawnX=room.playerStart.x;respawnY=room.playerStart.y;
  resetP(room.playerStart.x,room.playerStart.y);
  if(room.preCG&&room.preCG.length)showCG(room.preCG,()=>{state='playing';if(room.hasBoss)initBoss();});
  else{state='playing';if(room.hasBoss)initBoss();}
}
function nextRoom(){
  const go=()=>{
    if(room.isCharSel){loadRoom(chapterIdx+1,0);return;}
    const ni=roomIdx+1;
    if(ni<CHAPTERS[chapterIdx].length)loadRoom(chapterIdx,ni);
    else{
      const cgData=CHAPTER_END_CG[chapterIdx];
      const panels=cgData&&cgData[chosenChar];
      if(panels&&panels.length)showStoryCG(panels,()=>{state='cleared';});
      else state='cleared';
    }
  };
  if(room.postCG&&room.postCG.length)showCG(room.postCG,go);
  else go();
}

// ===== KEY PRESS =====
function onKeyPress(code){
  if((code==='KeyZ'||code==='Space')&&state==='playing'&&!P.dead){
    if(P.jumpsLeft>0){playSFX(P.jumpsLeft===2?'jump':'jump2');P.vy=P.jumpsLeft===2?JUMP1:JUMP2;P.jumpsLeft--;}
    return;
  }
  if((code==='KeyZ'||code==='Space'||code==='Enter')&&state==='cg'){advCG();return;}
  if(code==='Escape'&&state==='playing'){state='paused';return;}
  if(code==='Escape'&&state==='paused'){state='playing';return;}
  if(code==='Escape'&&state==='settings'){state=settingsFrom;return;}
  if(code==='Escape'&&state==='layout_edit'){exitLayoutEdit();return;}
  if(code==='KeyR'&&state==='playing'&&P.dead){bullets=[];thrownStars=[];swordWaves=[];resetP();const _rH3=room?(room.height||H):H;cam.y=Math.max(0,Math.min(P.y-H*0.4,_rH3-H));if(room&&room.hasBoss&&boss&&boss.state!=='dying'&&boss.state!=='dead')initBoss();return;}
  if((code==='KeyZ'||code==='Space'||code==='Enter')&&state==='cleared'){
    if(chapterIdx===1&&CHAPTERS[2]){loadRoom(2,0);}
    else if(chapterIdx===2&&CHAPTERS[3]){loadRoom(3,0);}
    else{state='title';}
    return;
  }
  if((code==='KeyZ'||code==='Space'||code==='Enter')&&state==='story_cg'){advStoryCG();return;}
  if(state==='title'){
    if(code==='ArrowUp'||code==='KeyW'||code==='ArrowDown'||code==='KeyS'){
      if(hasSave())titleSel=(titleSel+1)%2;return;
    }
    if(code==='KeyZ'||code==='Space'||code==='Enter'){
      if(hasSave()&&titleSel===0){
        const sv=loadSave();chosenChar=sv.char||'xuyuan';deaths=0;loadRoom(sv.ci,sv.ri);state='playing';if(room&&room.hasBoss)initBoss();
      }else{
        clearSave();state='intro';introIdx=0;
      }
      return;
    }
  }
  if((code==='KeyZ'||code==='Space'||code==='Enter')&&state==='intro'){advIntro();return;}
  if(state==='charselect'){
    if(code==='ArrowLeft'||code==='KeyA')selChar=0;
    if(code==='ArrowRight'||code==='KeyD')selChar=1;
    if(code==='KeyZ'||code==='Enter'){chosenChar=selChar===0?'xuyuan':'moxue';loadRoom(nextChapterIdx,0);}
  }
  if(code==='KeyX'&&state==='playing'&&!P.dead){
    if(chosenChar==='xuyuan'&&P.swordCd<=0){
      swordWaves.push({x:0,y:Math.floor(cam.y),py:P.y+P.h/2,w:W,h:H,life:10,type:'qi'});
      P.swordCd=SWORD_CD;screenShake=Math.max(screenShake,3);playSFX('slash');
    }
    if(chosenChar==='moxue'&&P.starCd<=0){
      const d=P.facing;
      P.burstQueue.push({delay:1,dir:d},{delay:6,dir:d},{delay:11,dir:d});
      P.starCd=STAR_CD;playSFX('dart');
    }
  }
  if(code==='KeyC'&&state==='playing'&&!P.dead){
    if(chosenChar==='xuyuan'&&P.dashCd<=0){
      P.dashActive=12;P.dashVx=P.facing*22;P.iframes=12;P.dashCd=DASH_CD;playSFX('dash');
      if(!P.onGround)P.vy=Math.min(P.vy,1);
    }
    if(chosenChar==='moxue'&&P.smokeCd<=0){
      bullets=[];P.smokeTimer=90;P.smokeCd=SMOKE_CD;screenShake=Math.max(screenShake,4);playSFX('smoke');
    }
  }
}

// ===== UPDATE =====
function update(){
  if(state!=='playing'){clearJD();return;}
  if(P.dead){
    deathFlash--;deathTimer--;
    if(deathTimer<=0){bullets=[];thrownStars=[];swordWaves=[];resetP();const _rH2=room?(room.height||H):H;cam.y=Math.max(0,Math.min(P.y-H*0.4,_rH2-H));if(room&&room.hasBoss&&boss&&boss.state!=='dying'&&boss.state!=='dead')initBoss();}
    clearJD();return;
  }
  if(P.swordCd>0)P.swordCd--;
  if(P.starCd>0)P.starCd--;
  if(P.dashCd>0)P.dashCd--;
  if(P.smokeCd>0)P.smokeCd--;
  if(P.dashActive>0){P.dashActive--;if(P.dashActive===0)P.iframes=0;}
  if(P.iframes>0)P.iframes--;
  if(P.smokeTimer>0){P.smokeTimer--;bullets=[];}
  if(saveFlash>0)saveFlash--;
  if(deathFlash>0)deathFlash--;
  if(screenShake>0)screenShake=Math.max(0,screenShake-0.6);
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;return p.life>0;});
  // 梅花连射 burst queue
  for(let i=P.burstQueue.length-1;i>=0;i--){
    if(--P.burstQueue[i].delay<=0){const d=P.burstQueue[i].dir;thrownStars.push({x:P.x+(d>0?P.w:-8),y:P.y+P.h/2-4,w:8,h:8,vx:d*12,vy:0});P.burstQueue.splice(i,1);}
  }
  // 移动（踏虚步期间锁定方向速度）
  if(P.dashActive>0){
    P.vx=P.dashVx;
  } else {
    if(keys['ArrowLeft']||keys['KeyA']){P.vx=-WALK_SPD;P.facing=-1;}
    else if(keys['ArrowRight']||keys['KeyD']){P.vx=WALK_SPD;P.facing=1;}
    else P.vx*=0.7;
  }
  P.vy+=GRAVITY;if(P.vy>MAX_FALL)P.vy=MAX_FALL;
  P.x+=P.vx;
  for(const pl of room.platforms){if(ov(P.x,P.y,P.w,P.h,pl.x,pl.y,pl.w,pl.h)){if(P.vx>0)P.x=pl.x-P.w;else P.x=pl.x+pl.w;P.vx=0;}}
  P.onGround=false;P.y+=P.vy;
  for(const pl of room.platforms){if(ov(P.x,P.y,P.w,P.h,pl.x,pl.y,pl.w,pl.h)){if(P.vy>=0){P.y=pl.y-P.h;P.vy=0;P.onGround=true;P.jumpsLeft=2;}else{P.y=pl.y+pl.h;P.vy=1;}}}
  // 移动平台：先携带玩家，再碰撞检测
  for(const mp of movingPlatforms){
    const prevY=mp.y;
    mp.y+=(mp.vy||0);
    if(mp.vy!==undefined){if(mp.y<=mp.y0)mp.vy=Math.abs(mp.vy);else if(mp.y+mp.h>=mp.y1)mp.vy=-Math.abs(mp.vy);}
    // 如果玩家站在平台顶面，随之移动
    if(P.onGround&&Math.abs(P.y+P.h-prevY)<3&&ov(P.x,P.y+P.h-2,P.w,4,mp.x,prevY,mp.w,mp.h)){
      P.y+=mp.y-prevY;
    }
  }
  for(const mp of movingPlatforms){
    if(ov(P.x,P.y,P.w,P.h,mp.x,mp.y,mp.w,mp.h)){
      if(P.vy>=0){P.y=mp.y-P.h;P.vy=0;P.onGround=true;P.jumpsLeft=2;}
      else{P.y=mp.y+mp.h;P.vy=1;}
    }
  }
  if(!P.wasOnGround&&P.onGround)spawnDust(P.x+P.w/2,P.y+P.h);
  P.wasOnGround=P.onGround;
  // 存档点检测必须在死亡判定前运行，否则同帧被棘刺杀死会因return跳过存档
  for(const cp of (room.checkpoints||[])){
    if(!cp.hit&&P.x+P.w>cp.x&&P.x<cp.x+cp.w&&P.y+P.h>cp.y&&P.y<cp.y+cp.h){
      cp.hit=true;respawnX=cp.sx;respawnY=cp.sy;saveFlash=120;playSFX('checkpoint');
    }
  }
  for(const s of room.spikes){
    if(s.period&&(frame+(s.phase||0))%s.period>=s.period*0.55)continue;
    const hit=s.type==='spinning_blade'?circHit(s.x,s.y,s.r):ov(P.x+1,P.y+1,P.w-2,P.h-2,s.x,s.y,s.w,s.h);
    if(hit){killP();return;}
  }
  updateMovingSpikes();
  for(const s of movingSpikes)if(ov(P.x+1,P.y+1,P.w-2,P.h-2,s.x,s.y,s.w,s.h)){killP();return;}
  if(!P.iframes)for(const b of bullets)if(ov(P.x+2,P.y+2,P.w-4,P.h-4,b.x,b.y,b.w,b.h)){killP();return;}
  updateEnemies();
  swordWaves=swordWaves.filter(sw=>{sw.life--;bullets=bullets.filter(b=>{if(ov(sw.x,sw.y,sw.w,sw.h,b.x,b.y,b.w,b.h)){spawnHit(b.x+b.w/2,b.y+b.h/2);return false;}return true;});return sw.life>0;});
  if(boss)updateBoss();
  const _rH=room.height||H;
  thrownStars=thrownStars.filter(s=>{s.x+=s.vx;s.y+=s.vy;let hit=false;bullets=bullets.filter(b=>{if(!hit&&ov(s.x,s.y,s.w,s.h,b.x,b.y,b.w,b.h)){hit=true;return false;}return true;});return !hit&&s.x>-40&&s.x<W+40&&s.y>-40&&s.y<_rH+40;});
  bullets=bullets.filter(b=>{b.x+=b.vx;b.y+=b.vy;return b.x>-60&&b.x<W+60&&b.y>-60&&b.y<_rH+60;});
  const _ex=room.exit||room.door;if(_ex&&ov(P.x,P.y,P.w,P.h,_ex.x,_ex.y,_ex.w,_ex.h)){playSFX('exit');nextRoom();return;}
  const rH=room.height||H;
  if(P.y>rH+80||P.x<-80||P.x>W+80)killP();
  const _tgt=Math.max(0,Math.min(P.y-H*0.4,rH-H));
  const _lf=Math.min(0.75,0.14+Math.max(0,P.vy)*0.018);
  cam.y+=(_tgt-cam.y)*_lf;
  clearJD();
}
function killP(){if(P.dead)return;P.dead=true;deaths++;deathFlash=20;deathTimer=22;screenShake=10;playSFX('die');}

// ===== BOSS =====
function initBoss(){
  let id;
  if(chapterIdx===3){id=chosenChar==='xuyuan'?'moxue_mirror':'xuyuan_mirror';}
  else{id=chosenChar==='xuyuan'?'chimei':'wangliang';}
  boss={x:360,y:508,w:32,h:48,hp:24,maxHp:24,phase:1,
    state:'intro',timer:90,facing:-1,vx:0,vy:0,
    iframes:0,hitPause:0,flashTimer:0,onGround:false,seqIdx:0,decoys:[],bossId:id};
  bossWarnings=[];
}
function nextBossAtk(){
  let seq;
  if(boss.bossId==='chimei'){seq=boss.phase===2?CHIMEI_P2_SEQ:CHIMEI_P1_SEQ;}
  else if(boss.bossId==='wangliang'){seq=boss.phase===2?WANGLIANG_P2_SEQ:WANGLIANG_P1_SEQ;}
  else if(boss.bossId==='xuyuan_mirror'){seq=boss.phase===2?XUYUAN_MIRROR_P2_SEQ:XUYUAN_MIRROR_P1_SEQ;}
  else if(boss.bossId==='moxue_mirror'){seq=boss.phase===2?MOXUE_MIRROR_P2_SEQ:MOXUE_MIRROR_P1_SEQ;}
  else{seq=boss.phase===2?BOSS_P2_SEQ:BOSS_P1_SEQ;}
  const atk=seq[boss.seqIdx%seq.length];
  boss.seqIdx++;
  boss.facing=P.x>boss.x?1:-1;
  if(atk==='dash'){boss.state='dash';boss.timer=boss.phase===2?28:35;}
  else if(atk==='shoot3'||atk==='shoot5'){boss.state=atk;boss.timer=18;}
  else if(atk==='wallJump'){boss.state='wallJump';boss.timer=10;}
  else if(atk==='bladeRain'){boss.state='bladeRain';boss.timer=8;boss.vx=0;}
}
function hitBoss(dmg){
  if(boss.iframes>0||boss.state==='intro'||boss.state==='dead'||boss.state==='dying')return;
  boss.hp=Math.max(0,boss.hp-dmg);
  boss.iframes=20;boss.hitPause=10;boss.flashTimer=12;
  screenShake=Math.max(screenShake,4);
  for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;particles.push({x:boss.x+boss.w/2,y:boss.y+20,vx:Math.cos(a)*3.5,vy:Math.sin(a)*3.5-1,life:18,max:18,gold:true});}
  if(boss.hp<=0){
    boss.state='dying';boss.timer=100;boss.vx=0;boss.vy=-7;
    bullets=[];bossWarnings=[];screenShake=14;
    for(let i=0;i<30;i++)particles.push({x:boss.x+boss.w/2,y:boss.y+boss.h/2,vx:(Math.random()-0.5)*11,vy:(Math.random()-0.5)*9-2,life:55+Math.floor(Math.random()*30),max:80,gold:Math.random()>0.4});
    return;
  }
  if(boss.hp<=BOSS_P2_HP&&boss.phase===1){
    boss.phase=2;boss.state='phaseShift';boss.timer=80;boss.seqIdx=0;boss.vx=0;boss.vy=0;
    bullets=[];bossWarnings=[];screenShake=12;
    for(let i=0;i<24;i++)particles.push({x:boss.x+boss.w/2,y:boss.y+boss.h/2,vx:(Math.random()-0.5)*10,vy:(Math.random()-0.5)*9-1,life:50,max:50,gold:false});
    const p2cg=room&&(room['phase2CG_'+chosenChar]||room.phase2CG);
    if(p2cg&&p2cg.length)showCG(p2cg,()=>{state='playing';boss.timer=80;});
  }
}
function updateBoss(){
  if(!boss||boss.state==='dead')return;
  if(boss.hitPause>0){boss.hitPause--;return;}
  if(boss.iframes>0)boss.iframes--;
  if(boss.flashTimer>0)boss.flashTimer--;
  const FLOOR=558;
  const spd=boss.phase===2?28:21;
  // physics (skip during phaseShift)
  if(boss.state!=='phaseShift'&&boss.state!=='dying_air'){
    boss.vy=Math.min(boss.vy+0.58,16);
    boss.y+=boss.vy;boss.x+=boss.vx;
  } else if(boss.state==='dying'){
    boss.vy=Math.min(boss.vy+0.58,16);
    boss.y+=boss.vy;boss.x+=boss.vx;
  }
  // floor
  if(boss.y+boss.h>=FLOOR){
    boss.y=FLOOR-boss.h;boss.vy=0;
    if(!boss.onGround&&boss.state==='wallJump_air'){
      boss.onGround=true;boss.vx=0;
      bossWarnings.push({x:boss.x+boss.w/2,y:FLOOR,r:52,timer:30,type:'splash'});
      boss.state='wallJump_land';boss.timer=40;
    } else boss.onGround=true;
  } else boss.onGround=false;
  // walls
  if(boss.x<14){boss.x=14;if(boss.state==='dash')boss.vx=0;if(boss.state==='wallJump_air'){boss.vx=Math.abs(boss.vx)*0.8;boss.vy=Math.min(boss.vy,-7);}}
  if(boss.x+boss.w>786){boss.x=786-boss.w;if(boss.state==='dash')boss.vx=0;if(boss.state==='wallJump_air'){boss.vx=-Math.abs(boss.vx)*0.8;boss.vy=Math.min(boss.vy,-7);}}
  boss.timer--;
  // --- state machine ---
  if(boss.state==='intro'){if(boss.timer<=0){boss.state='idle';boss.timer=60;}return;}
  if(boss.state==='idle'){boss.facing=P.x>boss.x?1:-1;boss.vx*=0.72;if(boss.timer<=0)nextBossAtk();return;}
  if(boss.state==='dash'){
    boss.vx=boss.facing*spd;
    if(boss.timer<=0){boss.vx=0;boss.state='idle';boss.timer=boss.phase===2?22:30;}
  }
  if(boss.state==='shoot3'||boss.state==='shoot5'){
    if(boss.timer===0){
      const n=boss.state==='shoot5'?5:3;const spread=(n===5?64:48)*Math.PI/180;
      const angle=Math.atan2(P.y+13-(boss.y+boss.h/2),P.x+8-(boss.x+boss.w/2));
      for(let i=0;i<n;i++){const a=angle+(i-(n-1)/2)*(spread/Math.max(1,n-1));bullets.push({x:boss.x+boss.w/2-5,y:boss.y+boss.h/2-5,w:10,h:10,vx:Math.cos(a)*5.5,vy:Math.sin(a)*5.5,type:'boss_qi'});}
    }
    if(boss.timer<=-28){boss.vx=0;boss.state='idle';boss.timer=boss.phase===2?24:34;}
  }
  if(boss.state==='wallJump'){
    if(boss.timer<=0){const dir=boss.x-14>786-(boss.x+boss.w)?-1:1;boss.vx=dir*13;boss.vy=-13;boss.state='wallJump_air';}
  }
  if(boss.state==='wallJump_land'){
    if(boss.timer===14){if(circHit(boss.x+boss.w/2,FLOOR,52)&&!P.dead&&!P.iframes)killP();}
    if(boss.timer<=0){boss.state='idle';boss.timer=36;}
  }
  if(boss.state==='bladeRain'){
    if(boss.timer===0){for(let i=0;i<(boss.phase===2?10:8);i++)bossWarnings.push({x:60+Math.floor(Math.random()*680),timer:34,type:'blade_warn'});}
    if(boss.timer===-34){for(const w of bossWarnings.filter(w=>w.type==='blade_warn'))bullets.push({x:w.x-5,y:-12,w:10,h:28,vx:0,vy:boss.phase===2?17:15,type:'boss_blade'});bossWarnings=bossWarnings.filter(w=>w.type!=='blade_warn');}
    if(boss.timer<=-82){boss.state='idle';boss.timer=boss.phase===2?32:42;}
  }
  if(boss.state==='hWave'){
    if(boss.timer===0){
      boss.vx=0;
      const fromRight=P.x<W/2;
      const dir=fromRight?-1:1;
      const startX=fromRight?796:-10;
      const rows=boss.phase===2?9:8;const rowSpd=boss.phase===2?8.0:7.0;
      for(let i=0;i<rows;i++)bullets.push({x:startX,y:FLOOR-220+i*27-5,w:10,h:10,vx:dir*rowSpd,vy:0,type:'boss_qi'});
      bossWarnings.push({x:W/2,y:FLOOR-105,dir:dir,timer:40,type:'hwave_warn'});
    }
    if(boss.timer<=-52){boss.vx=0;boss.state='idle';boss.timer=boss.phase===2?26:38;}
  }
  if(boss.state==='scatter'){
    if(boss.timer===0){
      boss.vx=0;
      const n=boss.phase===2?22:14;const spd2=boss.phase===2?5.2:4.5;
      for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2;bullets.push({x:boss.x+boss.w/2-5,y:boss.y+boss.h/2-5,w:10,h:10,vx:Math.cos(a)*spd2,vy:Math.sin(a)*spd2,type:'boss_qi'});}
      screenShake=Math.max(screenShake,6);
    }
    if(boss.timer<=-45){boss.vx=0;boss.state='idle';boss.timer=boss.phase===2?28:40;}
  }
  if(boss.state==='phaseShift'){boss.vx=0;boss.vy=0;if(boss.timer===30)boss.decoys=[{ox:-64,oy:0},{ox:64,oy:0}];if(boss.timer<=0){boss.state='idle';boss.timer=60;}return;}
  if(boss.state==='dying'){boss.vx*=0.88;if(boss.timer<=0){boss.state='dead';nextRoom();}return;}
  // update warning timers
  for(const w of bossWarnings)w.timer--;
  bossWarnings=bossWarnings.filter(w=>w.timer>-2);
  // update decoys (P2)
  for(const d of boss.decoys){d.cx=boss.x+d.ox+Math.sin(frame*0.07+d.ox)*14;d.cy=boss.y+d.oy+Math.cos(frame*0.05)*8;}
  // contact damage
  if(!P.dead&&!P.iframes&&boss.state!=='intro'&&boss.state!=='phaseShift'&&ov(P.x+2,P.y+2,P.w-4,P.h-4,boss.x,boss.y,boss.w,boss.h))killP();
  // sword wave damage
  for(const sw of swordWaves){if(sw.type==='qi'&&boss.iframes<=0&&ov(sw.x,sw.y,sw.w,sw.h,boss.x,boss.y,boss.w,boss.h)){hitBoss(2);break;}}
  // thrown star damage
  for(let i=thrownStars.length-1;i>=0;i--){if(boss.iframes<=0&&ov(thrownStars[i].x,thrownStars[i].y,thrownStars[i].w,thrownStars[i].h,boss.x,boss.y,boss.w,boss.h)){hitBoss(2);thrownStars.splice(i,1);break;}}
}

function drawGame(){
  drawBackground();
  ctx.save();
  // 屏幕震动
  if(screenShake>0){const s=Math.min(screenShake,6);ctx.translate(Math.round((Math.random()*2-1)*s),Math.round((Math.random()*2-1)*s));}
  ctx.translate(0,-Math.floor(cam.y));
  for(const p of room.platforms){
    ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,p.w,p.h);
    // edge highlights
    ctx.fillStyle='rgba(255,255,255,0.07)';ctx.fillRect(p.x,p.y,p.w,2);
    ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(p.x,p.y+p.h-2,p.w,2);
    ctx.fillStyle='rgba(255,255,255,0.03)';ctx.fillRect(p.x,p.y,2,p.h);
    // stone cracks — deterministic from platform position
    if(p.w>30){
      ctx.strokeStyle='rgba(0,0,0,0.22)';ctx.lineWidth=1;
      const seed=(p.x*3+p.y*7)&0xffff;
      const crackCount=Math.min(6,Math.floor(p.w/60)+1);
      for(let ci=0;ci<crackCount;ci++){
        const cx=p.x+((seed*13+ci*127)%Math.max(1,p.w-20))+10;
        const cy=p.y+3+((seed+ci*41)%Math.max(1,p.h-6));
        const len=8+((seed*ci+ci*37)%18);
        const angle=(((seed+ci*53)%7)-3)*0.3;
        ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(angle)*len,cy+Math.sin(angle)*len);ctx.stroke();
      }
    }
  }
  // 移动平台绘制（绿边石板，带脉冲光晕）
  for(const mp of movingPlatforms){
    ctx.fillStyle=mp.c||'#2a3830';ctx.fillRect(mp.x,mp.y,mp.w,mp.h);
    ctx.fillStyle='rgba(255,255,255,0.07)';ctx.fillRect(mp.x,mp.y,mp.w,2);
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(mp.x,mp.y+mp.h-2,mp.w,2);
    const pg=0.4+0.6*Math.sin(frame*0.07+(mp.y0||0)*0.01);
    ctx.fillStyle=`rgba(50,180,80,${0.18*pg})`;ctx.fillRect(mp.x,mp.y,mp.w,mp.h);
    ctx.strokeStyle=`rgba(60,200,90,${0.5*pg})`;ctx.lineWidth=1;ctx.strokeRect(mp.x,mp.y,mp.w,mp.h);
  }
  // checkpoint flags
  for(const cp of (room.checkpoints||[])){
    const px=cp.sx+8,base=cp.sy+25,hit=cp.hit;
    const wave=hit?Math.sin(frame*0.14)*5:0;
    if(hit){
      const g=ctx.createRadialGradient(px,base-30,3,px,base-30,34);
      g.addColorStop(0,'rgba(225,168,22,0.28)');g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(px,base-30,34,0,Math.PI*2);ctx.fill();
    }
    // pole
    ctx.fillStyle=hit?'rgba(195,148,28,0.95)':'rgba(75,75,92,0.72)';
    ctx.fillRect(px-1,base-54,3,54);
    // pole tip
    if(hit){ctx.fillStyle='rgba(255,218,72,0.92)';ctx.beginPath();ctx.arc(px,base-54,3.5,0,Math.PI*2);ctx.fill();}
    // flag triangle
    const fy=base-54,fh=22,fw=26;
    ctx.fillStyle=hit?'rgba(208,32,22,0.94)':'rgba(50,52,68,0.65)';
    ctx.beginPath();ctx.moveTo(px+2,fy+2);ctx.lineTo(px+2+fw+wave,fy+2+fh/2);ctx.lineTo(px+2,fy+2+fh);ctx.closePath();ctx.fill();
    if(hit){
      ctx.strokeStyle='rgba(255,155,130,0.42)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(px+4,fy+5);ctx.lineTo(px+fw*0.55+wave*0.45,fy+2+fh*0.38);ctx.stroke();
    }
    // label below flag
    ctx.fillStyle=hit?'rgba(245,205,80,0.88)':'rgba(95,95,115,0.58)';
    ctx.font='9px monospace';ctx.textAlign='center';ctx.fillText(hit?'存档':'□',px,base-1);
  }
  for(const s of room.spikes)drawHazard(s);
  for(const s of movingSpikes)drawHazard(s);
  const _dex=room.exit||room.door;if(_dex)drawExit(_dex);
  drawEnemies();
  for(const b of bullets)drawBullet(b);
  for(const s of thrownStars){
    ctx.save();ctx.translate(s.x+4,s.y+4);ctx.rotate(frame*0.32);
    ctx.fillStyle='#88ccff';
    for(let i=0;i<4;i++){ctx.fillRect(-1,-5,2,10);ctx.rotate(Math.PI/2);}
    ctx.restore();
  }
  for(const sw of swordWaves){
    if(sw.type==='qi'){
      const a=sw.life/10;
      ctx.save();
      // 全屏金色底光
      ctx.fillStyle=`rgba(255,200,60,${a*0.08})`;ctx.fillRect(sw.x,sw.y,sw.w,sw.h);
      // 玩家高度主光束（渐变）

      const bg=ctx.createLinearGradient(0,py-28,0,py+28);
      bg.addColorStop(0,'rgba(255,200,60,0)');bg.addColorStop(0.5,`rgba(255,215,80,${a*0.38})`);bg.addColorStop(1,'rgba(255,200,60,0)');
      ctx.fillStyle=bg;ctx.fillRect(0,py-28,W,56);
      ctx.shadowColor=`rgba(255,200,60,${a*0.9})`;ctx.shadowBlur=18;

      ctx.beginPath();ctx.moveTo(0,py);ctx.lineTo(W,py);ctx.stroke();
      ctx.strokeStyle=`rgba(255,255,220,${a*0.55})`;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(0,py-4);ctx.lineTo(W,py-4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,py+4);ctx.lineTo(W,py+4);ctx.stroke();
      ctx.restore();
    } else {
      const a=sw.life/20;
      ctx.fillStyle=`rgba(140,8,8,${a*0.18})`;ctx.fillRect(sw.x,sw.y,sw.w,sw.h);
      ctx.strokeStyle=`rgba(210,50,50,${a*0.85})`;ctx.lineWidth=1;ctx.strokeRect(sw.x,sw.y,sw.w,sw.h);
    }
  }
  // player drop shadow — ellipse at feet, fades when airborne
  const shadowAlpha=P.onGround?0.28:Math.max(0,0.14-Math.abs(P.vy)*0.012);
  if(shadowAlpha>0.02){
    ctx.fillStyle=`rgba(0,0,0,${shadowAlpha})`;
    ctx.beginPath();ctx.ellipse(P.x+P.w/2,P.y+P.h+2,P.w*0.55,4,0,0,Math.PI*2);ctx.fill();
  }
  if(!P.dead||(Math.floor(deathFlash)%4<2))drawChar(P.x,P.y,chosenChar,P.dead);
  if(chosenChar==='xuyuan'&&P.dashActive>0&&!P.dead){
    const sa=(P.dashActive/12)*0.55;
    ctx.fillStyle=`rgba(80,210,255,${sa})`;ctx.fillRect(P.x-4,P.y,P.w+8,P.h);
    ctx.fillStyle=`rgba(160,235,255,${sa*0.4})`;ctx.fillRect(P.x-P.dashVx*0.4-2,P.y+4,P.w+4,P.h-8);
  }
  // 粒子（落地尘土 + 弹幕命中）
  for(const p of particles){
    const a=p.life/p.max;
    ctx.globalAlpha=a*0.75;
    ctx.fillStyle=p.gold?'#ffcc44':'rgba(200,180,150,0.9)';
    ctx.fillRect(Math.floor(p.x),Math.floor(p.y),2,2);
  }
  ctx.globalAlpha=1;
  if(boss)drawBoss();
  ctx.restore();
  if(boss&&boss.state!=='dead'&&boss.state!=='intro')drawBossHP();
  // HUD 和死亡闪烁在屏幕坐标系
  if(deathFlash>0){ctx.fillStyle=`rgba(140,0,0,${Math.max(0,deathFlash)/24*0.48})`;ctx.fillRect(0,0,W,H);}
  if(P.dead&&deathTimer>0&&deathFlash<10){
    ctx.fillStyle='rgba(140,110,90,0.75)';ctx.font='12px monospace';ctx.textAlign='center';
    ctx.fillText('R  立即重生',W/2,H/2+8);
  }
  // 烟雾弹屏幕效果（screen-space）
  if(P.smokeTimer>0){
    const sa=Math.min(P.smokeTimer/20,1)*0.32;
    ctx.fillStyle=`rgba(18,45,110,${sa})`;ctx.fillRect(0,0,W,H);
    ctx.strokeStyle=`rgba(60,140,220,${Math.min(P.smokeTimer/40,1)*0.7})`;ctx.lineWidth=2.5;ctx.strokeRect(3,3,W-6,H-6);
    ctx.fillStyle=`rgba(80,160,240,${sa*0.25})`;
    for(let i=0;i<5;i++)ctx.fillRect(i*(W/5),0,W/5*0.6,H);
  }
  drawHints();
  drawHUD();
  if(state==='cg')drawCGOverlay();
}

function drawBoss(){
  if(!boss||boss.state==='dead')return;
  const bx=Math.round(boss.x),by=Math.round(boss.y);
  const bw=boss.w,bh=boss.h;
  const isP2=boss.phase===2;
  const dying=boss.state==='dying';
  const da=dying?Math.max(0,boss.timer/100):1;
  // warning markers
  for(const w of bossWarnings){
    ctx.save();
    if(w.type==='blade_warn'){
      const wa=Math.min(1,(34+w.timer)/34)*0.72;
      ctx.globalAlpha=wa;ctx.strokeStyle='rgba(200,50,240,0.88)';ctx.lineWidth=1;ctx.setLineDash([3,4]);
      ctx.beginPath();ctx.moveTo(w.x,0);ctx.lineTo(w.x,560);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='rgba(220,80,255,0.9)';ctx.beginPath();ctx.arc(w.x,6,5,0,Math.PI*2);ctx.fill();
    } else if(w.type==='hwave_warn'){
      const wa=Math.min(1,(40+w.timer)/40)*0.65;
      ctx.globalAlpha=wa;ctx.strokeStyle='rgba(220,50,50,0.85)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.moveTo(0,w.y);ctx.lineTo(W,w.y);ctx.stroke();ctx.setLineDash([]);
      const arrowX=w.dir>0?W-30:30;
      ctx.fillStyle='rgba(240,60,60,0.9)';ctx.beginPath();
      ctx.moveTo(arrowX,w.y-6);ctx.lineTo(arrowX+w.dir*12,w.y);ctx.lineTo(arrowX,w.y+6);ctx.fill();
    } else if(w.type==='splash'){
      const wa=Math.max(0,w.timer)/30*0.5;
      ctx.globalAlpha=wa;ctx.strokeStyle='rgba(180,40,220,0.9)';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(w.x,w.y,w.r,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='rgba(150,20,190,0.08)';ctx.fill();
    }
    ctx.restore();
  }
  // decoys (P2) — 幻影，明显半透明+闪烁光环
  for(const d of boss.decoys){
    if(d.cx===undefined)continue;
    ctx.save();
    const da2=0.18+0.24*Math.abs(Math.sin(frame*0.18+d.ox*0.05));
    // 外光环
    ctx.globalAlpha=da2*0.6;
    const dg=ctx.createRadialGradient(d.cx+bw/2,d.cy+bh/2,4,d.cx+bw/2,d.cy+bh/2,32);
    dg.addColorStop(0,'rgba(160,50,255,0.5)');dg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=dg;ctx.beginPath();ctx.arc(d.cx+bw/2,d.cy+bh/2,32,0,Math.PI*2);ctx.fill();
    // 躯体（浅紫，半透明）
    ctx.globalAlpha=da2;
    ctx.fillStyle='#3a1068';
    ctx.beginPath();ctx.moveTo(d.cx+2,d.cy);ctx.lineTo(d.cx+bw-2,d.cy);ctx.lineTo(d.cx+bw+3,d.cy+bh);ctx.lineTo(d.cx-3,d.cy+bh);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.arc(d.cx+bw/2,d.cy+8,bw/2+2,Math.PI,0);ctx.fill();
    ctx.restore();
  }
  // P2 glow
  ctx.save();ctx.globalAlpha=da;
  const bid=boss.bossId;
  const isChimei=bid==='chimei';const isMirrorXY=bid==='xuyuan_mirror';const isMirrorMX=bid==='moxue_mirror';
  const gf=boss.flashTimer>0?0.6:0.22;
  if(isP2){
    const glowCol=isChimei?`rgba(210,30,30,${gf})`:isMirrorXY?`rgba(200,160,40,${gf})`:isMirrorMX?`rgba(60,150,220,${gf})`:`rgba(150,30,210,${gf})`;
    const g=ctx.createRadialGradient(bx+bw/2,by+bh/2,4,bx+bw/2,by+bh/2,40);
    g.addColorStop(0,glowCol);g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(bx+bw/2,by+bh/2,40,0,Math.PI*2);ctx.fill();
  }
  // body silhouette
  const bodyCol=boss.flashTimer>0?'rgba(255,255,255,0.95)':
    isChimei?(isP2?'rgba(80,8,8,0.96)':'rgba(44,6,6,0.96)'):
    isMirrorXY?(isP2?'rgba(28,24,8,0.96)':'rgba(12,12,18,0.96)'):
    isMirrorMX?(isP2?'rgba(10,25,58,0.96)':'rgba(6,15,40,0.96)'):
    (isP2?'rgba(38,6,58,0.96)':'rgba(10,6,24,0.96)');
  ctx.fillStyle=bodyCol;
  ctx.beginPath();ctx.moveTo(bx+2,by);ctx.lineTo(bx+bw-2,by);ctx.lineTo(bx+bw+4,by+bh);ctx.lineTo(bx-4,by+bh);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.arc(bx+bw/2,by+8,bw/2+2,Math.PI,0);ctx.fill();
  // eyes
  if(boss.flashTimer<=0){
    const eCol=isChimei?(isP2?'rgba(255,60,60,0.95)':'rgba(200,50,50,0.88)'):
      isMirrorXY?(isP2?'rgba(220,180,60,0.95)':'rgba(180,140,50,0.88)'):
      isMirrorMX?(isP2?'rgba(120,200,255,0.95)':'rgba(80,170,220,0.88)'):
      (isP2?'rgba(210,70,255,0.95)':'rgba(150,70,210,0.88)');
    const ex=bx+bw/2+(boss.facing>0?3:-3);
    ctx.fillStyle=eCol;
    const shadowC=isChimei?'rgba(255,50,50,0.9)':isMirrorXY?'rgba(220,180,50,0.9)':isMirrorMX?'rgba(100,200,255,0.9)':'rgba(200,70,255,0.9)';
    if(isP2){ctx.shadowColor=shadowC;ctx.shadowBlur=7;}
    ctx.beginPath();ctx.arc(ex-3,by+14,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(ex+3,by+14,2,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }
  // dash trail
  if(boss.state==='dash'&&Math.abs(boss.vx)>2){
    const trailCol=isChimei?(isP2?'160,20,20':'80,10,10'):isMirrorXY?(isP2?'80,70,20':'30,28,10'):isMirrorMX?(isP2?'20,50,100':'10,28,60'):(isP2?'110,20,160':'30,14,60');
    ctx.fillStyle=`rgba(${trailCol},${Math.abs(boss.vx)/24*0.3})`;
    ctx.fillRect(bx-boss.vx*0.45,by+4,bw,bh-8);
  }
  ctx.globalAlpha=1;ctx.restore();
}
function drawBossHP(){
  if(!boss)return;
  const barW=280,barH=13,bx=(W-barW)/2,by=H-42;
  ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(bx-10,by-24,barW+20,42);
  ctx.strokeStyle='rgba(130,50,170,0.55)';ctx.lineWidth=1;ctx.strokeRect(bx-10,by-24,barW+20,42);
  const hpBid=boss.bossId;
  const isChimeiHP=hpBid==='chimei';const isXYMirror=hpBid==='xuyuan_mirror';const isMXMirror=hpBid==='moxue_mirror';
  const bossNameStr=isChimeiHP?('魑魅'+(boss.phase===2?' ◆ 血怒':'')):
    hpBid==='wangliang'?('魍魉'+(boss.phase===2?' ◆ 幻影':'')):
    isXYMirror?('虚渊'+(boss.phase===2?' ◆ 剑魄':'')):
    isMXMirror?('墨雪'+(boss.phase===2?' ◆ 绝境':'')):
    ('影卫·无名'+(boss.phase===2?' ◆ 影相':''));
  ctx.fillStyle=isChimeiHP?(boss.phase===2?'#ff5544':'#cc3322'):
    isXYMirror?(boss.phase===2?'#ddc044':'#aa9030'):
    isMXMirror?(boss.phase===2?'#44aaee':'#2288cc'):
    (boss.phase===2?'#cc55ff':'#8855cc');
  ctx.font='bold 11px serif';ctx.textAlign='center';
  ctx.fillText(bossNameStr,W/2,by-8);
  ctx.fillStyle='rgba(20,6,32,0.85)';ctx.fillRect(bx,by,barW,barH);
  const ratio=boss.hp/boss.maxHp;
  const bcol=boss.flashTimer>0?'#fff':
    isChimeiHP?(boss.phase===2?'rgba(218,38,38,0.9)':'rgba(155,28,28,0.9)'):
    isXYMirror?(boss.phase===2?'rgba(210,170,40,0.9)':'rgba(140,110,25,0.9)'):
    isMXMirror?(boss.phase===2?'rgba(50,160,218,0.9)':'rgba(30,110,170,0.9)'):
    (boss.phase===2?'rgba(175,38,218,0.9)':'rgba(96,28,155,0.9)');
  ctx.fillStyle=bcol;ctx.fillRect(bx,by,Math.floor(barW*ratio),barH);
  const p2x=bx+Math.floor(barW*(BOSS_P2_HP/boss.maxHp));
  ctx.strokeStyle='rgba(210,160,255,0.45)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p2x,by);ctx.lineTo(p2x,by+barH);ctx.stroke();
  ctx.strokeStyle='rgba(110,50,148,0.65)';ctx.lineWidth=1;ctx.strokeRect(bx,by,barW,barH);
  for(let i=1;i<boss.maxHp;i++){const px=bx+Math.floor(barW*(i/boss.maxHp));ctx.fillStyle='rgba(0,0,0,0.28)';ctx.fillRect(px-1,by,2,barH);}
}

function drawHints(){
  if(!room.hints||!room.hints.length)return;
  ctx.save();
  ctx.translate(0,-Math.floor(cam.y));
  ctx.textAlign='center';ctx.font='10px monospace';
  room.hints.forEach(h=>{
    ctx.fillStyle='rgba(170,145,65,0.44)';
    ctx.fillText(h.t,h.x,h.y);
  });
  ctx.restore();
}

// ─── SFX 引擎 (Web Audio 合成) ───
let _actx=null;
function _ac(){
  if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();
  if(_actx.state==='suspended')_actx.resume();
  return _actx;
}
function playSFX(name){
  if(!CFG.sfx)return;
  try{
    const ac=_ac(),t=ac.currentTime;
    const osc=(type,f0,f1,dur,vol,dt=0)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type=type;o.frequency.setValueAtTime(f0,t+dt);
      if(f1!==f0)o.frequency.exponentialRampToValueAtTime(f1,t+dt+dur*0.9);
      g.gain.setValueAtTime(vol,t+dt);g.gain.exponentialRampToValueAtTime(0.0001,t+dt+dur);
      o.connect(g);g.connect(ac.destination);o.start(t+dt);o.stop(t+dt+dur+0.02);
    };
    const noise=(dur,vol,lpHz,dt=0)=>{
      const len=Math.ceil(ac.sampleRate*dur),buf=ac.createBuffer(1,len,ac.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*(1-i/len);
      const src=ac.createBufferSource(),f=ac.createBiquadFilter(),g=ac.createGain();
      f.type='lowpass';f.frequency.value=lpHz;
      g.gain.setValueAtTime(vol,t+dt);g.gain.exponentialRampToValueAtTime(0.0001,t+dt+dur);
      src.buffer=buf;src.connect(f);f.connect(g);g.connect(ac.destination);src.start(t+dt);
    };
    switch(name){
      case'jump':  osc('sine',240,460,0.09,0.18);break;
      case'jump2': osc('triangle',430,800,0.07,0.14);osc('sine',1300,1300,0.08,0.07,0.02);break;
      case'die':   noise(0.32,0.28,1100);osc('sawtooth',310,55,0.38,0.2);break;
      case'checkpoint':
        [[523,0],[659,0.11],[784,0.22]].forEach(([f,dt])=>osc('sine',f,f,0.28,0.15,dt));break;
      case'slash':
        noise(0.09,0.2,8000);osc('sine',720,160,0.16,0.18);break;
      case'dash':  osc('sine',160,1200,0.09,0.13);break;
      case'dart':
        [0,0.07,0.14].forEach(dt=>osc('triangle',1100,360,0.07,0.12,dt));break;
      case'smoke': osc('square',110,32,0.25,0.2);noise(0.22,0.15,500);break;
      case'exit':
        [523,659,784,1047].forEach((f,i)=>osc('sine',f,f,0.22,0.14,i*0.09));break;
    }
  }catch(e){}
}

function _getElDy(el){const m=(el.style.transform||'').match(/translate\([^,]+,(-?\d+(?:\.\d+)?)px/);return m?+m[1]:0;}
function loadLayout(){

      if(d.sz){el.style.width=d.sz+'px';el.style.height=d.sz+'px';}

}

function handleSettingsTap(cx,cy){
  // 按键大小
  [0.75,1,1.3].forEach((s,i)=>{if(cx>=56+i*132&&cx<=174+i*132&&cy>=104&&cy<=150){CFG.btnScale=s;applyBtnScale();saveCFG();}});
  // 音效
  if(cx>=56&&cx<=174&&cy>=200&&cy<=244)  {CFG.sfx=true; saveCFG();}
  if(cx>=188&&cx<=306&&cy>=200&&cy<=244) {CFG.sfx=false;saveCFG();}
  // BGM
  if(cx>=56&&cx<=174&&cy>=292&&cy<=336)  {CFG.bgm=true; saveCFG();}
  if(cx>=188&&cx<=306&&cy>=292&&cy<=336) {CFG.bgm=false;saveCFG();}
  // 编辑按键布局
  if(cx>=W/2-90&&cx<=W/2+90&&cy>=432&&cy<=470){enterLayoutEdit();state='layout_edit';}
  // 返回
  if(cx>=W/2-90&&cx<=W/2+90&&cy>=478&&cy<=518){state=settingsFrom;}
  if(cy>540)state=settingsFrom;
}

function drawCharFacing(x,y,char,scale,flip){
  const s=scale||2,sw=12*s;
  if(flip){ctx.save();ctx.translate(2*(Math.floor(x)+sw/2),0);ctx.scale(-1,1);}
  if(char==='xuyuan')drawXuyuan(x,y,s);else drawMoxue(x,y,s);
  if(flip)ctx.restore();
}

function drawStoryCG(){
  const p=storyCGQ[storyCGI];if(!p)return;
  drawStoryCGBG(p);
  const s=p.charScale||4,s2=p.charScale2||3.5;
  if(p.char==='xuyuan')drawCharFacing(p.charX||374,p.charY||366,p.char,s,p.charFlip||false);
  else if(p.char==='moxue')drawCharFacing(p.charX||374,p.charY||366,p.char,s,p.charFlip||false);
  else if(p.char==='both'){
    drawCharFacing(p.charX||240,p.charY||375,p.charA||'xuyuan',s,p.charFlipA||false);
    drawCharFacing(p.charX2||490,p.charY2||(p.charY||375),p.charB||'moxue',s2,p.charFlipB||true);
  }
  ctx.fillStyle='rgba(0,0,0,0.84)';ctx.fillRect(0,H-158,W,158);
  ctx.strokeStyle='rgba(130,95,28,0.45)';ctx.lineWidth=1;ctx.strokeRect(14,H-154,W-28,150);

    const nc=p.speaker==='虚渊'?'#aa6868':'#6888c0';
    ctx.fillStyle=nc;ctx.font='bold 15px serif';ctx.textAlign='left';ctx.fillText(p.speaker,30,H-122);

    ctx.strokeStyle=nc;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(30,H-116);ctx.lineTo(30+tw,H-116);ctx.stroke();
  }
  ctx.fillStyle='#ddd8d0';ctx.font='18px serif';ctx.textAlign='left';
  ctx.fillText(p.text,30,p.speaker?H-90:H-104);
  ctx.fillStyle='rgba(50,40,30,0.85)';ctx.font='10px monospace';ctx.textAlign='right';
  ctx.fillText(`${storyCGI+1}/${storyCGQ.length}`,W-28,H-18);
  if(Math.floor(frame/22)%2===0){ctx.fillStyle='#c8a060';ctx.font='13px serif';ctx.textAlign='right';ctx.fillText('▼',W-28,H-30);}
}

// ===== MAIN LOOP =====
function loop(){
  frame++;
  update();
  ctx.clearRect(0,0,W,H);
  if(state==='title')drawTitle();
  else if(state==='intro')drawIntro();
  else if(state==='charselect')drawCharSelect();
  else if(state==='story_cg')drawStoryCG();
  else if(state==='cleared')drawCleared();
  else if(state==='settings')drawSettings();
  else if(state==='layout_edit')drawLayoutEdit();
  else if(state==='paused'){drawGame();drawPauseOverlay();}
  else drawGame();
  requestAnimationFrame(loop);
}
loop();

// ===== 移动端适配 =====
(function(){
  // 画布缩放
  function scaleC(){const s=Math.min(innerWidth/W,innerHeight/H);C.style.width=Math.round(W*s)+'px';C.style.height=Math.round(H*s)+'px';}
  window.addEventListener('resize',scaleC);scaleC();

  // 首次触摸：请求全屏 + 锁定横屏
  let didFull=false;
  function reqFull(){
    if(didFull)return;didFull=true;
    const el=document.documentElement;
    if(el.requestFullscreen)el.requestFullscreen().catch(()=>{});
    else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
    if(screen.orientation?.lock)screen.orientation.lock('landscape').catch(()=>{});
  }

  // ─── 统一多点触控手柄（支持滑动跳跃） ───
  const vpad=document.getElementById('vpad');
  const CMAP={vL:'ArrowLeft',vR:'ArrowRight',vJL:'KeyZ',vZ:'KeyZ',vX:'KeyX',vC:'KeyC',vPause:'Escape'};
  const active=new Map(); // touchId → {code, el, savedMov}

  // 按下/释放按键（检查其他触点是否仍持有该键）
  function vDn(c){if(!keys[c]){justDown[c]=true;onKeyPress(c);}keys[c]=true;}
  function vUp(c){if(c&&![...active.values()].some(a=>a.code===c||a.savedMov===c))keys[c]=false;}
  function getBtn(x,y){let el=document.elementFromPoint(x,y);while(el&&!(el.id&&CMAP[el.id]))el=el.parentElement;return el&&CMAP[el.id]?el:null;}

  // 处理触点移动（含滑动：移动键→跳跃键时保留移动）
  function processT(tid,x,y){
    const btn=getBtn(x,y),newC=btn?CMAP[btn.id]:null;
    const cur=active.get(tid);
    if(cur?.code===newC){btn?.classList.add('on');return;} // 同一按键，无需处理
    cur?.el.classList.remove('on');
    if(cur){
      // 从移动键滑向跳跃键：保留移动键持续按住
      const mov2jump=(cur.code==='ArrowLeft'||cur.code==='ArrowRight')&&newC==='KeyZ';
      const saved=mov2jump?(cur.savedMov||cur.code):null;
      active.delete(tid); // 先删除再调用 vUp，避免自引用
      if(!mov2jump){vUp(cur.code);if(cur.savedMov)vUp(cur.savedMov);}
      if(btn&&newC){active.set(tid,{code:newC,el:btn,savedMov:saved});btn.classList.add('on');vDn(newC);}
    } else if(btn&&newC){
      active.set(tid,{code:newC,el:btn,savedMov:null});btn.classList.add('on');vDn(newC);
    }
  }

  function endT(tid){
    const cur=active.get(tid);if(!cur)return;
    cur.el.classList.remove('on');active.delete(tid);
    vUp(cur.code);if(cur.savedMov)vUp(cur.savedMov);
  }

  if(vpad){
    const opt={passive:false};
    vpad.addEventListener('touchstart',e=>{
      e.preventDefault();
      for(const t of e.changedTouches){
        if(layoutMode){
          // 编辑模式：点击按钮选中 + 开始拖拽
          let el=document.elementFromPoint(t.clientX,t.clientY);
          while(el&&!EDIT_IDS.includes(el.id))el=el.parentElement;
          if(el&&EDIT_IDS.includes(el.id)){
            editSel=el.id;
            document.querySelectorAll('#vpad .vb').forEach(b=>b.classList.remove('on'));
            el.classList.add('on');
            _dragInfo={id:t.identifier,elId:el.id,startX:t.clientX,startY:t.clientY,origDx:_getElDx(el),origDy:_getElDy(el)};
            updateEditBar();
          }
        }else{reqFull();processT(t.identifier,t.clientX,t.clientY);}
      }
    },opt);
    vpad.addEventListener('touchmove',e=>{
      e.preventDefault();
      for(const t of e.changedTouches){
        if(layoutMode&&_dragInfo&&t.identifier===_dragInfo.id){
          const bel=document.getElementById(_dragInfo.elId);if(!bel)continue;
          bel.style.transform=`translate(${_dragInfo.origDx+(t.clientX-_dragInfo.startX)}px,${_dragInfo.origDy+(t.clientY-_dragInfo.startY)}px)`;
        }else if(!layoutMode){processT(t.identifier,t.clientX,t.clientY);}
      }
    },opt);
    vpad.addEventListener('touchend',e=>{
      e.preventDefault();
      for(const t of e.changedTouches){
        if(layoutMode){if(_dragInfo?.id===t.identifier)_dragInfo=null;}
        else endT(t.identifier);
      }
    },opt);
    vpad.addEventListener('touchcancel',e=>{
      for(const t of e.changedTouches){
        if(layoutMode){if(_dragInfo?.id===t.identifier)_dragInfo=null;}
        else endT(t.identifier);
      }
    });
  }

  // 编辑栏按钮
  document.getElementById('eSzM')?.addEventListener('click',()=>changeSize(-6));
  document.getElementById('eSzP')?.addEventListener('click',()=>changeSize(6));
  document.getElementById('editRst')?.addEventListener('click',resetLayout);
  document.getElementById('editOk')?.addEventListener('click',exitLayoutEdit);

  loadLayout();

  // 鼠标兼容（桌面调试）
  ['vL','vR','vJL','vZ','vX','vC'].forEach(id=>{
    const el=document.getElementById(id),c=CMAP[id];if(!el)return;
    el.addEventListener('mousedown',e=>{e.preventDefault();vDn(c);el.classList.add('on');});
    const up=()=>{keys[c]=false;el.classList.remove('on');};
    el.addEventListener('mouseup',up);el.addEventListener('mouseleave',up);
  });
  document.getElementById('vPause')?.addEventListener('click',()=>onKeyPress('Escape'));

  // ─── 画布点击：菜单/剧情/设置/死亡 ───
  C.addEventListener('touchstart',e=>{
    e.preventDefault();reqFull();
    const t=e.touches[0],rect=C.getBoundingClientRect();
    const cx=(t.clientX-rect.left)/(rect.width/W),cy=(t.clientY-rect.top)/(rect.height/H);
    if(state==='cg')advCG();
    else if(state==='title'){
      if(cx>680&&cy>548){settingsFrom='title';state='settings';}
      else if(hasSave()){
        const sv=loadSave();
        // 选项 y 位置: opt0=343, opt1=373（画布坐标，sy=247）
        const which=cy<358?0:1;
        if(which===0){chosenChar=sv.char||'xuyuan';deaths=0;loadRoom(sv.ci,sv.ri);state='playing';if(room&&room.hasBoss)initBoss();}
        else{clearSave();state='intro';introIdx=0;}
      }else{state='intro';introIdx=0;}
    }
    else if(state==='intro')advIntro();
    else if(state==='charselect'){selChar=cx<W/2?0:1;chosenChar=selChar===0?'xuyuan':'moxue';loadRoom(nextChapterIdx,0);}
    else if(state==='settings')handleSettingsTap(cx,cy);
    else if(state==='paused'){
      if(Math.abs(cy-(H/2+116))<24){settingsFrom='paused';state='settings';}
      else onKeyPress('Escape');
    }
    else if(state==='story_cg')advStoryCG();
    else if(state==='cleared')onKeyPress('KeyZ');
    else if(state==='playing'&&P.dead){bullets=[];thrownStars=[];swordWaves=[];resetP();const _rH3=room?(room.height||H):H;cam.y=Math.max(0,Math.min(P.y-H*0.4,_rH3-H));if(room&&room.hasBoss&&boss&&boss.state!=='dying'&&boss.state!=='dead')initBoss();}
  },{passive:false});

  document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
  document.addEventListener('contextmenu',e=>e.preventDefault());
})();
</script>
