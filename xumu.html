// ===== MAIN LOOP =====
function loop(ts){
  requestAnimationFrame(loop);
  if(!_loopLastTs){_loopLastTs=ts;return;}
  const delta=Math.min(ts-_loopLastTs,100);
  _loopLastTs=ts;
  _loopAcc+=delta;
  if(_loopAcc>200)_loopAcc=200;
  while(_loopAcc>=_STEP){frame++;update();_loopAcc-=_STEP;}
  ctx.clearRect(0,0,W,H);
  if(state==='title')drawTitle();
  else if(state==='intro')drawIntro();
  else if(state==='charselect')drawCharSelect();
  else if(state==='story_cg')drawStoryCG();
  else if(state==='cleared')drawCleared();
  else if(state==='choice')drawChoice();
  else if(state==='settings')drawSettings();
  else if(state==='layout_edit')drawLayoutEdit();
  else if(state==='paused'){drawGame();drawPauseOverlay();}
  else drawGame();
  if(devMode)drawDevOverlay();
}
requestAnimationFrame(loop);

// ===== 移动端适配 =====
(function(){
  // 画布缩放
  function scaleC(){const s=Math.min(innerWidth/W,innerHeight/H);C.style.width=Math.round(W*s)+'px';C.style.height=Math.round(H*s)+'px';}
  window.addEventListener('resize',scaleC);scaleC();

  // 首次触摸：请求全屏 + 锁定横屏
  let didFull=false;
  function reqFull(){
    try{_ac();}catch(e){}
    if(didFull)return;
    const el=document.documentElement;
    if(el.requestFullscreen)el.requestFullscreen().then(()=>{didFull=true;if(screen.orientation?.lock)screen.orientation.lock('landscape').catch(()=>{});}).catch(()=>{});
    else if(el.webkitRequestFullscreen){el.webkitRequestFullscreen();didFull=true;if(screen.orientation?.lock)screen.orientation.lock('landscape').catch(()=>{});}
  }

  // ─── 统一多点触控手柄（支持滑动跳跃） ───
  const vpad=document.getElementById('vpad');
  const CMAP={vL:'ArrowLeft',vR:'ArrowRight',vJL:'KeyZ',vZ:'KeyZ',vX:'KeyX',vC:'KeyC',vV:'KeyV',vPause:'Escape',vF:'KeyF'};
  const active=new Map(); // touchId → {code, el, savedMov}

  // 按下/释放按键（检查其他触点是否仍持有该键）
  function vDn(c){if(!keys[c]){justDown[c]=true;onKeyPress(c);}keys[c]=true;}
  function vUp(c){if(c&&![...active.values()].some(a=>a.code===c||a.savedMov===c))keys[c]=false;}
  function getBtn(x,y){let el=document.elementFromPoint(x,y);while(el&&!(el.id&&CMAP[el.id]))el=el.parentElement;return el&&CMAP[el.id]?el:null;}

  // 处理触点移动（含滑动：移动键→跳跃键时保留移动）
  function processT(tid,x,y){
    const btn=getBtn(x,y),newC=btn?CMAP[btn.id]:null;
    const cur=active.get(tid);
    if(cur?.code===newC){btn?.classList.add('on');return;} // 同一按键，无需处理
    cur?.el.classList.remove('on');
    if(cur){
      // 从移动键滑向跳跃键：保留移动键持续按住
      const mov2jump=(cur.code==='ArrowLeft'||cur.code==='ArrowRight')&&newC==='KeyZ';
      const saved=mov2jump?(cur.savedMov||cur.code):null;
      active.delete(tid); // 先删除再调用 vUp，避免自引用
      if(!mov2jump){vUp(cur.code);if(cur.savedMov)vUp(cur.savedMov);}
      if(btn&&newC){active.set(tid,{code:newC,el:btn,savedMov:saved});btn.classList.add('on');vDn(newC);}
    } else if(btn&&newC){
      active.set(tid,{code:newC,el:btn,savedMov:null});btn.classList.add('on');vDn(newC);
    }
  }

  function endT(tid){
    const cur=active.get(tid);if(!cur)return;
    cur.el.classList.remove('on');active.delete(tid);
    vUp(cur.code);if(cur.savedMov)vUp(cur.savedMov);
  }

  if(vpad){
    const opt={passive:false};
    vpad.addEventListener('touchstart',e=>{
      e.preventDefault();
      for(const t of e.changedTouches){
        if(layoutMode){
          // 编辑模式：点击按钮选中 + 开始拖拽
          let el=document.elementFromPoint(t.clientX,t.clientY);
          while(el&&!EDIT_IDS.includes(el.id))el=el.parentElement;
          if(el&&EDIT_IDS.includes(el.id)){
            editSel=el.id;
            document.querySelectorAll('#vpad .vb').forEach(b=>b.classList.remove('on'));
            el.classList.add('on');
            _dragInfo={id:t.identifier,elId:el.id,startX:t.clientX,startY:t.clientY,origDx:_getElDx(el),origDy:_getElDy(el)};
            updateEditBar();
          }
        }else{reqFull();processT(t.identifier,t.clientX,t.clientY);}
      }
    },opt);
    vpad.addEventListener('touchmove',e=>{
      e.preventDefault();
      for(const t of e.changedTouches){
        if(layoutMode&&_dragInfo&&t.identifier===_dragInfo.id){
          const bel=document.getElementById(_dragInfo.elId);if(!bel)continue;
          bel.style.transform=`translate(${_dragInfo.origDx+(t.clientX-_dragInfo.startX)}px,${_dragInfo.origDy+(t.clientY-_dragInfo.startY)}px)`;
        }else if(!layoutMode){processT(t.identifier,t.clientX,t.clientY);}
      }
    },opt);
    vpad.addEventListener('touchend',e=>{
      e.preventDefault();
      for(const t of e.changedTouches){
        if(layoutMode){if(_dragInfo?.id===t.identifier)_dragInfo=null;}
        else endT(t.identifier);
      }
    },opt);
    vpad.addEventListener('touchcancel',e=>{
      for(const t of e.changedTouches){
        if(layoutMode){if(_dragInfo?.id===t.identifier)_dragInfo=null;}
        else endT(t.identifier);
      }
    });
  }

  // 编辑栏按钮
  document.getElementById('eSzM')?.addEventListener('click',()=>changeSize(-6));
  document.getElementById('eSzP')?.addEventListener('click',()=>changeSize(6));
  document.getElementById('editRst')?.addEventListener('click',resetLayout);
  document.getElementById('editOk')?.addEventListener('click',exitLayoutEdit);

  loadLayout();

  // 鼠标兼容（桌面调试）
  ['vL','vR','vJL','vZ','vX','vC','vV','vF'].forEach(id=>{
    const el=document.getElementById(id),c=CMAP[id];if(!el)return;
    el.addEventListener('mousedown',e=>{e.preventDefault();vDn(c);el.classList.add('on');});
    const up=()=>{keys[c]=false;el.classList.remove('on');};
    el.addEventListener('mouseup',up);el.addEventListener('mouseleave',up);
  });
  document.getElementById('vPause')?.addEventListener('click',()=>onKeyPress('Escape'));

  // ─── 画布点击：菜单/剧情/设置/死亡 ───
  C.addEventListener('touchstart',e=>{
    e.preventDefault();reqFull();
    const t=e.touches[0],rect=C.getBoundingClientRect();
    const cx=(t.clientX-rect.left)/(rect.width/W),cy=(t.clientY-rect.top)/(rect.height/H);
    if(state==='cg')advCG();
    else if(state==='title'){
      if(cx>680&&cy>548){settingsFrom='title';state='settings';}
      else if(hasSave()){
        const sv=loadSave();
        // 选项 y 位置: opt0=343, opt1=373（画布坐标，sy=247）
        const which=cy<358?0:1;
        if(which===0){chosenChar=sv.char||'xuyuan';deaths=sv.deaths||0;if(sv.keys)hiddenKeys=sv.keys.concat([false,false,false]).slice(0,3);if(sv.ga)greatArtUnlocked=true;loadRoom(sv.ci,sv.ri);state='playing';if(room&&room.hasBoss)initBoss();}
        else{clearSave();tutorialDone=false;hiddenKeys=[false,false,false];greatArtUnlocked=false;greatArtCd=0;state='intro';introIdx=0;}
      }else{state='intro';introIdx=0;}
    }
    else if(state==='intro')advIntro();
    else if(state==='charselect'){selChar=cx<W/2?0:1;chosenChar=selChar===0?'xuyuan':'moxue';loadRoom(nextChapterIdx,0);}
    else if(state==='settings')handleSettingsTap(cx,cy);
    else if(state==='paused'){
      if(Math.abs(cy-(H/2+152))<11){settingsFrom='paused';state='settings';}
      else if(Math.abs(cy-(H/2+122))<11){state='title';}
      else onKeyPress('Escape');
    }
    else if(state==='story_cg')advStoryCG();
    else if(state==='cleared'){if(cy>H/2+111)onKeyPress('KeyR');else onKeyPress('KeyZ');}
    else if(state==='playing'&&tutorialOverlay){tutorialOverlay=false;tutorialDone=true;}
    else if(state==='playing'&&P.dead){bullets=[];thrownStars=[];swordWaves=[];resetP();const _rH3=room?(room.height||H):H;cam.y=Math.max(0,Math.min(P.y-H*0.4,_rH3-H));if(room&&room.hasBoss&&boss&&boss.state!=='dying'&&boss.state!=='dead')initBoss();}
  },{passive:false});

  document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
  document.addEventListener('contextmenu',e=>e.preventDefault());
})();
